spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: https://keycloak-deploy-st9e.onrender.com/realms/fitness-oauth2/protocol/openid-connect/certs
  cloud:
    gateway:
      default-filters:
        - TokenRelay

      routes:
        - id: userservice
          uri: lb://userservice
          predicates:
            - Path=/api/users/**

        - id: activityservice
          uri: lb://activityservice
          predicates:
            - Path=/api/activities/**

        - id: aiservice
          uri: lb://aiservice
          predicates:
            - Path=/api/recommendations/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-x9j7.onrender.com/eureka

  instance:
    prefer-ip-address: true
