spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://keycloak-deploy-st9e.onrender.com/realms/fitness-oauth2/protocol/openid-connect/certs

  cloud:
    loadbalancer:
      enabled: false

    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
        - TokenRelay=

      httpclient:
        connect-timeout: 10000
        response-timeout: 60s

      # ✅ CORS Configuration Added
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://fitness-frontend-6ogz.onrender.com"  # ✅ Replace with your frontend URL
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: userservice
          uri: https://userservice-n20l.onrender.com
          predicates:
            - Path=/api/users/**

        - id: activityservice
          uri: https://activityservice-pcce.onrender.com
          predicates:
            - Path=/api/activities/**

        - id: aiservice
          uri: https://aiservice-z1dw.onrender.com
          predicates:
            - Path=/api/recommendations/**

server:
  port: ${PORT:8080}

eureka:
  client:
    enabled: false

# ✅ Enable actuator to debug routes
management:
  endpoints:
    web:
      exposure:
        include: health, gateway, info
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG   # ✅ See routing decisions
    org.springframework.security: DEBUG        # ✅ See auth decisions
    reactor.netty: DEBUG