spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader

      routes:
        - id: userservice
          uri: https://your-userservice.onrender.com
          predicates:
            - Path=/api/users/**

        - id: activityservice
          uri: https://activityservice-pcce.onrender.com
          predicates:
            - Path=/api/activities/**

        - id: aiservice
          uri: https://your-aiservice.onrender.com
          predicates:
            - Path=/api/recommendations/**

server:
  port: 8080


eureka:
  client:
    enabled: false