spring:
  application:
    name: aiservice

  main:
    allow-bean-definition-overriding: true

  config:
    import: "optional:none"

  datasource:
    url: ${SPRING_DATASOURCE_AI_URL}
    username: ${SPRING_DATASOURCE_AI_USERNAME}
    password: ${SPRING_DATASOURCE_AI_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none        # ✅ Change from 'update' to 'none' temporarily
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # ✅ MUST have this to validate JWT from gateway
          jwk-set-uri: https://keycloak-deploy-st9e.onrender.com/realms/fitness-oauth2/protocol/openid-connect/certs


  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    listener:
      simple:
        missing-queues-fatal: false  # ✅ Don't crash if queue missing

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

server:
  port: ${PORT:8083}

gemini:
  api:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    key: ${GEMINI_API_KEY}

logging:
  level:
    root: INFO
    com.fitness.aiservice: DEBUG
    org.springframework.security: DEBUG
    com.zaxxer.hikari: INFO

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking