spring:
  application:
    name: aiservice

  main:
    allow-bean-definition-overriding: true

  config:
    import: "optional:none"

  datasource:
    url: ${SPRING_DATASOURCE_AI_URL}
    username: ${SPRING_DATASOURCE_AI_USERNAME}
    password: ${SPRING_DATASOURCE_AI_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ✅ Remove spring.security block entirely - handled in SecurityConfig.java

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    listener:
      simple:
        missing-queues-fatal: false

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

server:
  port: ${PORT:8083}

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    key: ${GEMINI_API_KEY}

logging:
  level:
    root: INFO
    com.fitness.aiservice: DEBUG