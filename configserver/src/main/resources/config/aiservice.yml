spring:
  application:
    name: aiservice

  config:
    import: optional:none

  datasource:
    # ✅ Add port 5432 explicitly
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-wispy-frost-am8hoymc-pooler.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_Metmp7ufgOc0}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      # ✅ SSL properties explicitly for Neon
      data-source-properties:
        sslmode: require
        ssl: true

  cloud:
    config:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    listener:
      simple:
        message-converter:
          trusted-packages: "*"

logging:
  level:
    org.springframework.boot.context.config: DEBUG
    com.zaxxer.hikari: DEBUG  # ✅ Add this to see actual URL being used

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: true

server:
  port: ${PORT:8080}

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent
    key: ${GEMINI_API_KEY}