spring:
  datasource:
    url: ${AI_DB_URL}
    username: ${AI_DB_USERNAME}
    password: ${AI_DB_PASSWORD}

    jpa:
      hibernate:
        ddl-auto: update
      database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    listener:
      simple:
        message-converter:
          trusted-packages: "*"


eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-x9j7.onrender.com/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


server:
  port: 8083

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent
    key: ${GEMINI_API_KEY}