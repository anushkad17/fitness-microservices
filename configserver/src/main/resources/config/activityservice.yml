spring:
  application:
    name: activityservice

    config:
      import:
        optional:configserver:

  cloud:
    config:
      enabled: false   # ✅ ADD THIS

  datasource:
    url: ${ACTIVITY_DB_URL}
    username: ${ACTIVITY_DB_USERNAME}
    password: ${ACTIVITY_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

server:
  port: 8082

eureka:
  client:
    enabled: false

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking